<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invitación ☕</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('fondo.jpg') no-repeat center center/cover;
      text-align: center;
      overflow-x: hidden;
    }

    .overlay {
      background: rgba(0,0,0,0.4);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      color: white;
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 { font-size: 30px; }
    p { font-size: 18px; }

    /* 💗 TARJETAS */
    .card {
      background: rgba(255, 228, 236, 0.9);
      color: #333;
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 8px 25px rgba(255, 182, 193, 0.5);
      backdrop-filter: blur(6px);
      animation: fadeIn 2s ease;
    }

    iframe {
      width: 100%;
      height: 250px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 80%;
      border-radius: 30px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .yes { background: #ff8fab; color: white; }
    .yes:hover { background: #ff5d8f; transform: scale(1.05); }

    .fun { background: #ffc2d1; color: #333; }
    .fun:hover { background: #ff99ac; transform: scale(1.05); }

    .no { background: #ddd; }

    footer {
      margin-top: 20px;
      font-size: 14px;
      color: #eee;
    }

    /* 💘 CORAZONES */
    .heart {
      position: fixed;
      bottom: -10px;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
      opacity: 0.7;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }
  </style>
</head>

<body>

  <!-- 🎵 MÚSICA -->
  <audio id="musica" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <div class="overlay">
    <div class="container">
      
      <h1>Iliana querida, te dejo esto 😊</h1>
      <p>Te espero!</p>

      <p>🔊 Tocá la pantalla 😉</p>

      <div class="card">
        <h2>☕ Te dejo todo listo para vernos!</h2>
        <p>📅 Día: Proximamente</p>
        <p>🕒 Hora: Proximamente</p>
        <p>📍 Lugar: Sublime cafe</p>

        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d27204.66625789626!2d-68.5597515!3d-31.5356034!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9681410073b2a5a5%3A0x5a3d5eb28883a34b!2sSublime%20caf%C3%A9!5e0!3m2!1ses-419!2sar!4v1775279328911!5m2!1ses-419!2sar"></iframe>
      </div>

      <div class="card">
        <p>Espero solamente hacerte pasarla bien 😌</p>

        <button class="btn yes" onclick="aceptar()">Siiiii</button>
        <button class="btn fun" onclick="obvio()">Obvio 😏</button>
        <button class="btn no" onclick="rechazar()">ño😒</button>
      </div>

      <footer>
        (No hay opción incorrecta… bueno sí jaja)
      </footer>

    </div>
  </div>

  <script>
    // 🎵 música al tocar
    document.addEventListener("click", function () {
      const audio = document.getElementById("musica");
      audio.play();
    }, { once: true });

    function aceptar() {
      window.location.href = "https://www.instagram.com/lautirosass/";
    }

    function obvio() {
      window.location.href = "https://www.instagram.com/lautirosass/";
    }

    function rechazar() {
      alert("Esa opción no está disponible 😜");
    }

    // 💘 generar corazones
    function crearCorazon() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💗";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (3 + Math.random() * 3) + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(crearCorazon, 500);
  </script>

</body>
</html>
