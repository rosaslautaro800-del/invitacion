<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invitación ☕</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') no-repeat center center/cover;
      color: #333;
      text-align: center;
    }

    .overlay {
      background: rgba(0,0,0,0.5);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      color: white;
    }

    h1 { font-size: 30px; }
    p { font-size: 18px; }

    /* 💗 TARJETAS ROSA PASTEL */
    .card {
      background: #ffe4ec;
      color: #333;
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 8px 25px rgba(255, 182, 193, 0.4);
      backdrop-filter: blur(5px);
    }

    iframe {
      width: 100%;
      height: 250px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 80%;
      border-radius: 30px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    /* 💗 BOTONES COMBINADOS */
    .yes { background: #ff8fab; color: white; }
    .yes:hover { background: #ff5d8f; }

    .fun { background: #ffc2d1; color: #333; }
    .fun:hover { background: #ff99ac; }

    .no { background: #ddd; }

    footer {
      margin-top: 20px;
      font-size: 14px;
      color: #eee;
    }
  </style>
</head>

<body>

  <!-- 🎵 MÚSICA -->
  <audio id="musica" loop>
    <source src="lana.mp3" type="audio/mpeg">
  </audio>

  <div class="overlay">
    <div class="container">
      
      <h1>Iliana querida, te dejo esto 😊</h1>
      <p>Te espero!</p>

      <p>🔊 Tocá la pantalla 😉</p>

      <div class="card">
        <h2>☕ Te dejo todo listo para vernos!</h2>
        <p>📅 Día: Lunes 6/04/2026</p>
        <p>🕒 Hora: 18:30</p>
        <p>📍 Lugar: Sublime cafe</p>

        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d27204.66625789626!2d-68.5597515!3d-31.5356034!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9681410073b2a5a5%3A0x5a3d5eb28883a34b!2sSublime%20caf%C3%A9!5e0!3m2!1ses-419!2sar!4v1775279328911!5m2!1ses-419!2sar"></iframe>
      </div>

      <div class="card">
        <p>Espero que la pases muy bien y hacerte reir mucho! 😌</p>

        <button class="btn yes" onclick="aceptar()">Sí 😊</button>
        <button class="btn fun" onclick="obvio()">Obvio 😏</button>
        <button class="btn no" onclick="rechazar()">No 😒</button>
      </div>

      <footer>
        (No hay opción incorrecta… bueno sí 😅)
      </footer>

    </div>
  </div>

  <script>
    // 🎵 reproducir música al primer toque
    document.addEventListener("click", function () {
      const audio = document.getElementById("musica");
      audio.play();
    }, { once: true });

    function aceptar() {
      window.location.href = "https://www.instagram.com/lautirosass/";
    }

    function obvio() {
      window.location.href = "https://www.instagram.com/lautirosass/";
    }

    function rechazar() {
      alert("Esa opción no está disponible 😜");
    }
  </script>

</body>
</html>
